# GoReleaser — cross-compiled binaries, archives, checksums, CycloneDX SBOM, GitHub Release.
# Validate locally with `goreleaser check` and dry-run with `make release-snapshot`.
# Docs: https://goreleaser.com
version: 2

project_name: vmware_licenses_exporter

# Normalise the optional tap PAT so templates can truthy-check it even when it is
# absent (local snapshots) or empty (CI without the secret) — both mean "skip the cask".
env:
  - HOMEBREW_TAP_GITHUB_TOKEN={{ if isEnvSet "HOMEBREW_TAP_GITHUB_TOKEN" }}{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}{{ end }}

before:
  hooks:
    - go mod download

builds:
  - id: vmware_licenses_exporter
    main: .
    binary: vmware_licenses_exporter
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    flags:
      - -trimpath
    # Mirrors the Makefile LDFLAGS: strip + inject main.version.
    ldflags:
      - -s -w -X main.version={{ .Version }}
    # Reproducible builds: stamp binaries with the commit time, not build time.
    mod_timestamp: "{{ .CommitTimestamp }}"

archives:
  # tar.gz archives bundling the licence, README, and a sample config.
  - id: vmware_licenses_exporter
    formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - README.md
      - config.yaml
  # Raw, un-archived binaries for consumers who script direct downloads.
  - id: vmware_licenses_exporter_bin
    formats: [binary]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt
  algorithm: sha256

# Module-wide CycloneDX SBOM via `go run` (self-contained — needs nothing on PATH, so
# `goreleaser release` works even in CI that hasn't run `make tools` first). Pin matches
# the Makefile's CYCLONEDX_VERSION; bump both together.
# GoReleaser runs sbom commands inside ./dist, so the module root is `../`.
# `artifacts: any` runs the command once and emits a single module SBOM, using the SAME
# flags as `make sbom` (cyclonedx-gomod mod -json -output) so both SBOMs match.
sboms:
  - id: cyclonedx-gomod
    artifacts: any
    documents:
      - "{{ .ProjectName }}_{{ .Version }}.sbom.cdx.json"
    cmd: go
    args: ["run", "github.com/CycloneDX/cyclonedx-gomod/cmd/cyclonedx-gomod@v1.10.0", "mod", "-json", "-output", "$document", "../"]

# First-ever multi-arch container image, published to GHCR by the release pipeline.
# buildx cross-lays the GoReleaser-built binary per-platform; Dockerfile.goreleaser
# COPYs it (plus config.yaml, listed in extra_files so it lands in the build context).
dockers_v2:
  - id: vmware_licenses_exporter
    ids: [vmware_licenses_exporter]
    dockerfile: Dockerfile.goreleaser
    images: ["ghcr.io/fjacquet/vmware_licenses_exporter"]
    tags: ["{{ .Version }}", "{{ .Major }}.{{ .Minor }}", "{{ if not .Prerelease }}latest{{ end }}"]
    platforms: [linux/amd64, linux/arm64]
    extra_files: [config.yaml]
    labels:
      org.opencontainers.image.title: "{{ .ProjectName }}"
      org.opencontainers.image.version: "{{ .Version }}"
      org.opencontainers.image.revision: "{{ .FullCommit }}"
      org.opencontainers.image.source: "https://github.com/fjacquet/vmware_licenses_exporter"
    sbom: true

# Homebrew cask (macOS only — casks are not supported on Linux). Published to a separate
# tap repo, which requires a cross-repo PAT (HOMEBREW_TAP_GITHUB_TOKEN); the default
# GITHUB_TOKEN cannot push to another repo. `skip_upload` keeps releases (and local
# snapshots) working until that secret + the tap repo exist.
# Install: brew install --cask fjacquet/tap/vmware_licenses_exporter
homebrew_casks:
  - name: vmware_licenses_exporter
    # Two archives (tar.gz + raw binary) share each OS/arch; point the cask at the
    # tar.gz archive so it has one unambiguous artifact per platform.
    ids: [vmware_licenses_exporter]
    skip_upload: '{{ if .Env.HOMEBREW_TAP_GITHUB_TOKEN }}false{{ else }}true{{ end }}'
    repository:
      owner: fjacquet
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: https://github.com/fjacquet/vmware_licenses_exporter
    description: Prometheus + OTLP exporter for VMware vSphere licenses
    # The binary is unsigned; strip the quarantine bit so Gatekeeper doesn't block it.
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/vmware_licenses_exporter"]
          end

# Use GitHub's native auto-generated release notes.
changelog:
  use: github-native

release:
  github:
    owner: fjacquet
    name: vmware_licenses_exporter
  draft: false
  prerelease: auto
