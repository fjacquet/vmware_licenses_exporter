global:
  scrape_interval: 15s

rule_files:
  - /etc/prometheus/license.rules.yml

scrape_configs:
  - job_name: vmware_licenses_exporter
    metrics_path: /metrics
    honor_labels: true   # keep the exporter's own instance="primary" label (else Prometheus renames it to exported_instance)
    static_configs:
      - targets: ["vmware_licenses_exporter:9106"]
